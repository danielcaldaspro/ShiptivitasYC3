<!DOCTYPE html>
<html>
<head>
    <title>Shiptivitas Data Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; margin: 0; padding: 40px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-weight: 800; color: #ff6600; text-align: center; margin-bottom: 40px; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 30px; border: 2px solid #ff6600; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-item { flex: 1; background: #fff; padding: 20px; border-radius: 12px; border: 2px solid #ff6600; text-align: center; }
        .stat-label { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 2rem; font-weight: 800; color: #ff6600; }
        .growth { font-weight: 800; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Shiptivitas Analytics Dashboard</h1>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Avg DAU Before</div>
                <div class="stat-value" id="avgBefore">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Avg DAU After</div>
                <div class="stat-value" id="avgAfter">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Growth</div>
                <div class="stat-value growth" id="growthPercent">--</div>
            </div>
        </div>

        <div class="card">
            <h2>Daily Active Users (DAU) Over Time</h2>
            <canvas id="dauChart"></canvas>
        </div>

        <div class="card">
            <h2>Card Status Changes (Engagement)</h2>
            <canvas id="changesChart"></canvas>
        </div>
    </div>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const launchDate = '2018-06-28'; // First user action
                const labels = data.dau.map(d => d.day);
                const dauValues = data.dau.map(d => d.users);

                // Calculate Metrics
                const before = data.dau.filter(d => d.day < launchDate);
                const after = data.dau.filter(d => d.day >= launchDate);
                const avgB = before.reduce((a, b) => a + b.users, 0) / before.length;
                const avgA = after.reduce((a, b) => a + b.users, 0) / after.length;
                const g = ((avgA / avgB) - 1) * 100;

                document.getElementById('avgBefore').innerText = avgB.toFixed(2);
                document.getElementById('avgAfter').innerText = avgA.toFixed(2);
                document.getElementById('growthPercent').innerText = '+' + g.toFixed(2) + '%';

                // DAU Chart
                new Chart(document.getElementById('dauChart'), {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Daily Active Users',
                            data: dauValues,
                            borderColor: '#ff6600',
                            backgroundColor: 'rgba(255, 102, 0, 0.25)',
                            fill: true,
                            tension: 0.4,
                            pointStyle: 'rect',
                            pointRadius: 5,
                            pointHoverRadius: 8
                        }]
                    },
                    options: {
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } }
                    }
                });

                // Changes Chart
                new Chart(document.getElementById('changesChart'), {
                    type: 'bar',
                    data: {
                        labels: data.changes.map(c => c.day),
                        datasets: [{
                            label: 'Status Changes',
                            data: data.changes.map(c => c.count),
                            backgroundColor: '#ff6600'
                        }]
                    }
                });
            });
    </script>
</body>
</html>
